# ArgoCD Installation
# Run: kubectl create namespace argocd
# Run: kubectl apply -n argocd -f https://raw.githubusercontent.com/argoproj/argo-cd/stable/manifests/install.yaml
# Wait: kubectl wait --for=condition=available deployment/argocd-server -n argocd --timeout=300s
# Port-forward: kubectl port-forward svc/argocd-server -n argocd 8080:443
# Get password: kubectl -n argocd get secret argocd-initial-admin-secret -o jsonpath="{.data.password}" | base64 -d
#
# This file is intentionally a comment-only YAML file serving as installation instructions.
# The actual ArgoCD installation is done via the official manifests above.
#
# After installation, apply the Application CRDs in this directory:
# kubectl apply -f k8s/argocd/01-app-application.yaml
# kubectl apply -f k8s/argocd/02-monitoring-application.yaml
# kubectl apply -f k8s/argocd/03-argocd-project.yaml
