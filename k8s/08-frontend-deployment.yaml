apiVersion: apps/v1
kind: Deployment
metadata:
  name: todo-frontend
  namespace: todo-app
  labels:
    app: todo-frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: todo-frontend
  template:
    metadata:
      labels:
        app: todo-frontend
    spec:
      containers:
        - name: todo-frontend
          # Minikube: use IfNotPresent (image built locally in minikube docker env)
          # EKS: replace with your ECR image URI, e.g. 123456789.dkr.ecr.us-east-1.amazonaws.com/todo-frontend:latest
          image: todo-frontend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 5000
          env:
            - name: API_BASE_URL
              valueFrom:
                configMapKeyRef:
                  name: todo-config
                  key: API_BASE_URL
            - name: FLASK_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: todo-secrets
                  key: flask-secret-key
          readinessProbe:
            httpGet:
              path: /
              port: 5000
            initialDelaySeconds: 10
            periodSeconds: 5
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /
              port: 5000
            initialDelaySeconds: 30
            periodSeconds: 10
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "256Mi"
              cpu: "300m"
