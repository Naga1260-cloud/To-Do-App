apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: monitoring
  labels:
    app: prometheus
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
      evaluation_interval: 15s

    alerting:
      alertmanagers:
        - static_configs:
            - targets:
                - alertmanager.monitoring.svc.cluster.local:9093

    rule_files:
      - /etc/prometheus/alert_rules.yml

    scrape_configs:
      - job_name: 'prometheus'
        static_configs:
          - targets: ['localhost:9090']

      - job_name: 'todo-api'
        kubernetes_sd_configs:
          - role: pod
            namespaces:
              names: ['todo-app']
        relabel_configs:
          - source_labels: [__meta_kubernetes_pod_label_app]
            action: keep
            regex: todo-api
          - source_labels: [__meta_kubernetes_pod_ip]
            target_label: __address__
            replacement: '$1:8000'
        metrics_path: /metrics

      - job_name: 'kubernetes-nodes-cadvisor'
        scheme: https
        tls_config:
          ca_file: /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
          insecure_skip_verify: true
        bearer_token_file: /var/run/secrets/kubernetes.io/serviceaccount/token
        kubernetes_sd_configs:
          - role: node
        relabel_configs:
          - action: labelmap
            regex: __meta_kubernetes_node_label_(.+)
          - target_label: __address__
            replacement: kubernetes.default.svc:443
          - source_labels: [__meta_kubernetes_node_name]
            target_label: __metrics_path__
            replacement: /api/v1/nodes/$1/proxy/metrics/cadvisor

      - job_name: 'postgres-exporter'
        kubernetes_sd_configs:
          - role: pod
            namespaces:
              names: ['todo-app']
        relabel_configs:
          - source_labels: [__meta_kubernetes_pod_label_app]
            action: keep
            regex: postgres-exporter
          - source_labels: [__meta_kubernetes_pod_ip]
            target_label: __address__
            replacement: '$1:9187'
  alert_rules.yml: |
    groups:
      - name: todo-app-alerts
        interval: 30s
        rules:
          - alert: TodoAPIDown
            expr: up{job="todo-api"} == 0
            for: 1m
            labels:
              severity: critical
            annotations:
              summary: "Todo API is down"
              description: "The Todo API has been unreachable for more than 1 minute."
          - alert: HighErrorRate
            expr: |
              (
                rate(http_requests_total{job="todo-api", status=~"5.."}[5m])
                /
                rate(http_requests_total{job="todo-api"}[5m])
              ) > 0.05
            for: 5m
            labels:
              severity: warning
            annotations:
              summary: "High HTTP error rate"
              description: "Error rate is above 5% for the last 5 minutes."
          - alert: DatabaseDown
            expr: pg_up == 0
            for: 1m
            labels:
              severity: critical
            annotations:
              summary: "PostgreSQL database is down"
              description: "The PostgreSQL exporter cannot reach the database."
          - alert: HighDiskUsage
            expr: |
              (
                node_filesystem_size_bytes{fstype!~"tmpfs|fuse.lxcfs"} - node_filesystem_free_bytes{fstype!~"tmpfs|fuse.lxcfs"}
              ) / node_filesystem_size_bytes{fstype!~"tmpfs|fuse.lxcfs"} > 0.85
            for: 5m
            labels:
              severity: warning
            annotations:
              summary: "High disk usage (> 85%)"
              description: "A filesystem is over 85% full."
