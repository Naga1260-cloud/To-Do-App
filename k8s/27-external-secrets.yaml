# External Secrets Operator must be installed first:
# kubectl apply -f https://github.com/external-secrets/external-secrets/releases/latest/download/install.yaml
# Wait for CRDs: kubectl wait --for=condition=established crd/externalsecrets.external-secrets.io --timeout=60s

---
# ServiceAccount for the API pod — annotated with the IRSA role ARN
apiVersion: v1
kind: ServiceAccount
metadata:
  name: todo-api
  namespace: todo-app
  annotations:
    eks.amazonaws.com/role-arn: REPLACE_WITH_ROLE_ARN

---
# SecretStore: tells ESO how to connect to AWS Secrets Manager
apiVersion: external-secrets.io/v1beta1
kind: SecretStore
metadata:
  name: aws-secrets-manager
  namespace: todo-app
spec:
  provider:
    aws:
      service: SecretsManager
      region: us-east-1
      auth:
        jwt:
          serviceAccountRef:
            name: todo-api

---
# ExternalSecret: syncs the AWS secret to a K8s Secret
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: todo-db-external-secret
  namespace: todo-app
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secrets-manager
    kind: SecretStore
  target:
    name: todo-db-secret
    creationPolicy: Owner
  data:
    - secretKey: db-url
      remoteRef:
        key: todo-app/prod/db-credentials
        property: username
    - secretKey: db-password
      remoteRef:
        key: todo-app/prod/db-credentials
        property: password
    - secretKey: db-host
      remoteRef:
        key: todo-app/prod/db-credentials
        property: host
    - secretKey: db-name
      remoteRef:
        key: todo-app/prod/db-credentials
        property: dbname
