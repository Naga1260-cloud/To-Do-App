groups:
  - name: todo-app-alerts
    interval: 30s
    rules:
      - alert: TodoAPIDown
        expr: up{job="todo-api"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Todo API is down"
          description: "The Todo API has been unreachable for more than 1 minute. Instance: {{ $labels.instance }}"
          runbook_url: "https://github.com/YOUR_ORG/YOUR_REPO/blob/main/docs/runbooks/api-down.md"

      - alert: HighErrorRate
        expr: |
          (
            rate(http_requests_total{job="todo-api", status=~"5.."}[5m])
            /
            rate(http_requests_total{job="todo-api"}[5m])
          ) > 0.05
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High HTTP error rate detected"
          description: "Error rate is {{ $value | humanizePercentage }} over the last 5 minutes."

      - alert: HighResponseTime
        expr: |
          histogram_quantile(0.95,
            rate(http_request_duration_seconds_bucket{job="todo-api"}[5m])
          ) > 2
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High API response time (p95 > 2s)"
          description: "95th percentile response time is {{ $value | humanizeDuration }}."

      - alert: DatabaseDown
        expr: pg_up == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "PostgreSQL database is down"
          description: "The PostgreSQL exporter cannot reach the database. Instance: {{ $labels.instance }}"
          runbook_url: "https://github.com/YOUR_ORG/YOUR_REPO/blob/main/docs/runbooks/db-down.md"

      - alert: HighMemoryUsage
        expr: |
          (
            container_memory_usage_bytes{name=~"todo.*"}
            /
            container_spec_memory_limit_bytes{name=~"todo.*"}
          ) > 0.80
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Container memory usage above 80%"
          description: "Container {{ $labels.name }} is using {{ $value | humanizePercentage }} of its memory limit."

      - alert: LokiDown
        expr: up{job="loki"} == 0
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Loki log aggregation is down"
          description: "Loki has been unreachable for more than 5 minutes. Log ingestion may be affected."

      - alert: PrometheusDown
        expr: up{job="prometheus"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Prometheus is down"
          description: "Prometheus itself has been unreachable. Monitoring is severely impacted."

      - alert: HighDiskUsage
        expr: |
          (
            node_filesystem_size_bytes{fstype!~"tmpfs|fuse.lxcfs"} - node_filesystem_free_bytes{fstype!~"tmpfs|fuse.lxcfs"}
          ) / node_filesystem_size_bytes{fstype!~"tmpfs|fuse.lxcfs"} > 0.85
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High disk usage (> 85%)"
          description: "Disk {{ $labels.device }} on {{ $labels.instance }} is {{ $value | humanizePercentage }} full."
